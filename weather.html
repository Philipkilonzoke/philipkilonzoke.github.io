<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Weather Globe - Brightlens News</title>
    
    <!-- Preload critical resources for instant loading -->
    <link rel="preload" href="css/weather-globe.css" as="style">
    <link rel="preload" href="js/weather-globe.js" as="script">
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js" as="script">
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/globe.gl@2.31.0/dist/globe.gl.min.js" as="script">
    
    <!-- Optimized CSS -->
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/weather-globe.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- High-performance Globe libraries - using more reliable CDN -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/globe.gl@2.31.0/dist/globe.gl.min.js"></script>
</head>
<body>
    <div class="weather-app">
        <!-- Header -->
        <header class="header" id="header">
            <h1>
                <i class="fas fa-globe-americas"></i>
                3D Weather Globe
            </h1>
            <div class="header-controls">
                <a href="index.html" class="home-link">
                    <i class="fas fa-arrow-left"></i>
                    Back to News
                </a>
            </div>
        </header>

        <!-- Globe Container -->
        <div class="globe-container">
            <div id="globe"></div>
        </div>

        <!-- Zoom Level Indicator -->
        <div class="zoom-indicator" id="zoom-indicator">
            <div class="zoom-level">
                <i class="fas fa-search-plus"></i>
                <span id="zoom-text">World View</span>
            </div>
            <div class="location-count">
                <span id="location-count">0</span> locations visible
            </div>
        </div>

        <!-- Navigation Instructions -->
        <div class="nav-instructions" id="nav-instructions">
            <div class="instruction-item">
                <i class="fas fa-mouse-pointer"></i>
                <span>Drag to rotate</span>
            </div>
            <div class="instruction-item">
                <i class="fas fa-search-plus"></i>
                <span>Scroll to zoom</span>
            </div>
            <div class="instruction-item">
                <i class="fas fa-map-marker-alt"></i>
                <span>Click for weather</span>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="control-btn" onclick="resetGlobe()" title="Reset to World View">
                <i class="fas fa-globe"></i>
                <span>Reset</span>
            </button>
            <button class="control-btn" id="auto-rotate-btn" onclick="toggleRotation()" title="Auto Rotate">
                <i class="fas fa-play" id="rotation-icon"></i>
                <span id="rotation-text">Rotate</span>
            </button>
            <button class="control-btn" onclick="toggleLabels()" title="Toggle Labels" id="labels-btn">
                <i class="fas fa-tags" id="labels-icon"></i>
                <span id="labels-text">Labels</span>
            </button>
        </div>

        <!-- Loading Screen -->
        <div class="loading-screen" id="loading-screen">
            <div class="loading-content">
                <div class="globe-loader">
                    <div class="loader-sphere"></div>
                    <div class="loader-ring"></div>
                </div>
                <h2>Loading 3D Earth...</h2>
                <p>Preparing your weather experience</p>
                <div class="loading-progress">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
            </div>
        </div>

        <!-- Weather Details Panel -->
        <div class="weather-panel" id="weather-panel">
            <div class="panel-header">
                <div class="location-title">
                    <i class="fas fa-map-marker-alt"></i>
                    <h3 id="location-name">Select a location</h3>
                </div>
                <button class="close-panel" onclick="closeWeatherPanel()">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            
            <div class="weather-content">
                <div class="current-weather">
                    <div class="weather-icon-container">
                        <img id="weather-icon" src="" alt="Weather Icon" class="weather-icon">
                    </div>
                    <div class="weather-main-info">
                        <div class="temperature" id="temperature">--°</div>
                        <div class="condition" id="condition">Loading...</div>
                        <div class="location-details" id="location-details">--</div>
                    </div>
                </div>
                
                <div class="weather-stats">
                    <div class="stat-item">
                        <div class="stat-icon"><i class="fas fa-thermometer-half"></i></div>
                        <div class="stat-info">
                            <span class="stat-label">Feels like</span>
                            <span class="stat-value" id="feels-like">--°</span>
                        </div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-icon"><i class="fas fa-tint"></i></div>
                        <div class="stat-info">
                            <span class="stat-label">Humidity</span>
                            <span class="stat-value" id="humidity">--%</span>
                        </div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-icon"><i class="fas fa-wind"></i></div>
                        <div class="stat-info">
                            <span class="stat-label">Wind</span>
                            <span class="stat-value" id="wind-speed">-- km/h</span>
                        </div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-icon"><i class="fas fa-eye"></i></div>
                        <div class="stat-info">
                            <span class="stat-label">Visibility</span>
                            <span class="stat-value" id="visibility">-- km</span>
                        </div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-icon"><i class="fas fa-compress-arrows-alt"></i></div>
                        <div class="stat-info">
                            <span class="stat-label">Pressure</span>
                            <span class="stat-value" id="pressure">-- hPa</span>
                        </div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-icon"><i class="fas fa-sun"></i></div>
                        <div class="stat-info">
                            <span class="stat-label">UV Index</span>
                            <span class="stat-value" id="uv-index">--</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Search Panel -->
        <div class="search-panel" id="search-panel">
            <div class="search-container">
                <div class="search-input-container">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="search-input" placeholder="Search for a city..." autocomplete="off">
                    <button class="clear-search" id="clear-search" onclick="clearSearch()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="search-results" id="search-results"></div>
            </div>
            <button class="search-toggle" onclick="toggleSearch()">
                <i class="fas fa-search"></i>
            </button>
        </div>
    </div>

    <!-- Load main JavaScript -->
    <script src="js/weather-data.js"></script>
    <script src="js/weather-globe.js"></script>
    
    <script>
        // Debug function to check what's loaded
        function checkDependencies() {
            console.log('=== Weather Globe Debug ===');
            console.log('THREE.js loaded:', typeof THREE !== 'undefined');
            console.log('Globe.gl loaded:', typeof Globe !== 'undefined');
            console.log('WeatherData loaded:', typeof WeatherData !== 'undefined');
            console.log('WeatherGlobe loaded:', typeof WeatherGlobe !== 'undefined');
            
            if (typeof WeatherData !== 'undefined') {
                console.log('WeatherData API key:', WeatherData.API_KEY ? 'Present' : 'Missing');
            }
            
            if (typeof WeatherGlobe !== 'undefined') {
                console.log('WeatherGlobe init method:', typeof WeatherGlobe.init === 'function' ? 'Present' : 'Missing');
            }
        }

        // Initialize the weather globe when DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM Content Loaded');
            checkDependencies();
            
            // Wait a bit for libraries to fully load
            setTimeout(() => {
                try {
                    console.log('Attempting to initialize WeatherGlobe...');
                    if (typeof WeatherGlobe !== 'undefined' && typeof WeatherGlobe.init === 'function') {
                        WeatherGlobe.init();
                        console.log('WeatherGlobe.init() called successfully');
                    } else {
                        console.error('WeatherGlobe is not available or init method missing');
                        // Fallback - show a simple message
                        document.getElementById('globe').innerHTML = '<div style="color: white; text-align: center; padding: 50px;">Loading 3D Globe...</div>';
                    }
                } catch (error) {
                    console.error('Error initializing WeatherGlobe:', error);
                    document.getElementById('globe').innerHTML = '<div style="color: white; text-align: center; padding: 50px;">Error loading 3D Globe. Please refresh the page.</div>';
                }
            }, 1000);
        });

        // Additional error handling
        window.addEventListener('error', function(e) {
            console.error('Global error:', e.error);
        });
    </script>
</body>
</html>
