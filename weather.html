<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Weather Globe - Brightlens News</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Globe.gl Library -->
    <script src="https://unpkg.com/globe.gl"></script>
    <script src="https://unpkg.com/three"></script>
    
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-surface: #1a1a1a;
            --bg-elevated: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --accent-blue: #4285f4;
            --accent-green: #34a853;
            --accent-orange: #fbbc04;
            --accent-red: #ea4335;
            --gradient-primary: linear-gradient(135deg, #4285f4 0%, #34a853 100%);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --shadow-glow: 0 0 40px rgba(66, 133, 244, 0.3);
            --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            user-select: none;
        }

        .weather-app {
            position: relative;
            height: 100vh;
            background: radial-gradient(ellipse at center, #0f1419 0%, #0a0e13 50%, #050810 100%);
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 0.8rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .header.collapsed {
            transform: translateY(-100%);
        }

        .header h1 {
            font-size: 1.3rem;
            font-weight: 600;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header-controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .home-link {
            color: var(--text-secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .home-link:hover {
            color: var(--text-primary);
            background: var(--glass-bg);
        }

        .globe-container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            cursor: grab;
        }

        .globe-container:active {
            cursor: grabbing;
        }

        #globe {
            width: 100%;
            height: 100%;
        }

        .weather-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: var(--bg-surface);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(24px);
            z-index: 2000;
            max-width: 380px;
            width: 90%;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0;
        }

        .weather-popup.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
        }

        .popup-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            color: var(--text-primary);
            background: var(--glass-bg);
        }

        .weather-content {
            text-align: center;
        }

        .weather-main {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.2rem;
        }

        .weather-icon {
            width: 64px;
            height: 64px;
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.3));
        }

        .weather-info {
            flex: 1;
            text-align: left;
        }

        .temperature {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent-blue);
            margin-bottom: 0.2rem;
            line-height: 1;
        }

        .description {
            font-size: 1rem;
            color: var(--text-secondary);
            text-transform: capitalize;
            margin-bottom: 0.3rem;
        }

        .location-info {
            font-size: 0.85rem;
            color: var(--text-secondary);
            opacity: 0.8;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.8rem;
        }

        .detail-item {
            background: var(--bg-elevated);
            border-radius: 10px;
            padding: 0.8rem;
            text-align: center;
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
        }

        .detail-item:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-1px);
        }

        .detail-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
        }

        .detail-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .controls {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            z-index: 1000;
        }

        .control-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 0.8rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(20px);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            min-width: 120px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .control-btn:hover {
            background: var(--bg-elevated);
            transform: translateY(-2px);
            box-shadow: var(--shadow-soft);
        }

        .control-btn.active {
            background: var(--accent-blue);
            color: white;
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 1500;
            background: var(--bg-surface);
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--glass-border);
            border-top: 3px solid var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .zoom-info {
            position: fixed;
            top: 80px;
            left: 1.5rem;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 10px;
            padding: 1rem;
            border: 1px solid var(--glass-border);
            max-width: 220px;
            z-index: 500;
            opacity: 0.95;
            transition: all 0.3s ease;
        }

        .zoom-info.hidden {
            opacity: 0;
            transform: translateX(-100%);
        }

        .zoom-info h3 {
            color: var(--accent-blue);
            margin-bottom: 0.8rem;
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .zoom-info ul {
            list-style: none;
            color: var(--text-secondary);
            font-size: 0.85rem;
            line-height: 1.5;
        }

        .zoom-info li {
            margin-bottom: 0.4rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .zoom-info i {
            color: var(--accent-green);
            width: 14px;
            font-size: 0.8rem;
        }

        .location-counter {
            position: fixed;
            top: 80px;
            right: 1.5rem;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 10px;
            padding: 0.8rem 1.2rem;
            border: 1px solid var(--glass-border);
            z-index: 500;
            font-size: 0.9rem;
            color: var(--text-secondary);
            transition: all 0.3s ease;
        }

        .location-counter .count {
            color: var(--accent-blue);
            font-weight: 600;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .header {
                padding: 0.6rem 1rem;
            }

            .header h1 {
                font-size: 1.1rem;
            }

            .zoom-info {
                position: static;
                margin: 1rem;
                max-width: none;
                order: 1;
            }

            .controls {
                bottom: 1rem;
                right: 1rem;
                left: 1rem;
                flex-direction: row;
                justify-content: center;
                flex-wrap: wrap;
            }

            .control-btn {
                flex: 1;
                min-width: 100px;
                font-size: 0.8rem;
                padding: 0.7rem;
            }

            .weather-popup {
                max-width: 340px;
                padding: 1.2rem;
            }

            .temperature {
                font-size: 2.2rem;
            }

            .location-counter {
                top: auto;
                bottom: 5rem;
                right: 1rem;
                left: auto;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 1rem;
            }

            .weather-details {
                grid-template-columns: 1fr;
            }

            .controls {
                gap: 0.5rem;
            }

            .control-btn {
                padding: 0.6rem;
                font-size: 0.75rem;
            }

            .weather-main {
                flex-direction: column;
                text-align: center;
            }

            .weather-info {
                text-align: center;
            }
        }

        /* Performance optimizations */
        .globe-container canvas {
            will-change: transform;
        }

        .weather-popup {
            will-change: transform, opacity;
        }

        .loading {
            will-change: opacity;
        }

        /* Smooth scrollbar for mobile */
        ::-webkit-scrollbar {
            display: none;
        }

        html {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body>
    <div class="weather-app">
        <!-- Header -->
        <header class="header" id="header">
            <h1>
                <i class="fas fa-globe-americas"></i>
                3D Weather Globe
            </h1>
            <div class="header-controls">
                <a href="index.html" class="home-link">
                    <i class="fas fa-arrow-left"></i>
                    Back to News
                </a>
            </div>
        </header>

        <!-- Globe Container -->
        <div class="globe-container">
            <div id="globe"></div>
        </div>

        <!-- Zoom Instructions -->
        <div class="zoom-info" id="zoom-info">
            <h3><i class="fas fa-info-circle"></i> Navigation</h3>
            <ul>
                <li><i class="fas fa-mouse"></i> Drag to rotate</li>
                <li><i class="fas fa-search-plus"></i> Scroll to zoom</li>
                <li><i class="fas fa-map-marker-alt"></i> Click for weather</li>
                <li><i class="fas fa-mobile-alt"></i> Touch & pinch</li>
            </ul>
        </div>

        <!-- Location Counter -->
        <div class="location-counter" id="location-counter">
            <span class="count" id="location-count">0</span> locations visible
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="control-btn" onclick="resetGlobe()" title="Reset View">
                <i class="fas fa-home"></i> Reset
            </button>
            <button class="control-btn" id="auto-rotate-btn" onclick="toggleAnimation()" title="Auto Rotate">
                <i class="fas fa-play" id="animation-icon"></i> <span id="animation-text">Auto</span>
            </button>
            <button class="control-btn" onclick="toggleUI()" title="Toggle UI">
                <i class="fas fa-eye" id="ui-icon"></i> <span id="ui-text">Hide UI</span>
            </button>
        </div>

        <!-- Loading Indicator -->
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>Loading 3D Earth Globe...</p>
        </div>

        <!-- Weather Popup -->
        <div class="weather-popup" id="weather-popup">
            <div class="popup-header">
                <div class="popup-title">
                    <i class="fas fa-cloud-sun"></i>
                    <span id="popup-city">Weather Info</span>
                </div>
                <button class="close-btn" onclick="closeWeatherPopup()" title="Close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="weather-content">
                <div class="weather-main">
                    <img class="weather-icon" id="weather-icon" src="" alt="Weather Icon">
                    <div class="weather-info">
                        <div class="temperature" id="weather-temp">--°</div>
                        <div class="description" id="weather-desc">Loading...</div>
                        <div class="location-info" id="location-info">--</div>
                    </div>
                </div>
                <div class="weather-details">
                    <div class="detail-item">
                        <div class="detail-label">
                            <i class="fas fa-thermometer-half"></i>
                            Feels like
                        </div>
                        <div class="detail-value" id="feels-like">--°</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">
                            <i class="fas fa-tint"></i>
                            Humidity
                        </div>
                        <div class="detail-value" id="humidity">--%</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">
                            <i class="fas fa-wind"></i>
                            Wind Speed
                        </div>
                        <div class="detail-value" id="wind-speed">-- m/s</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">
                            <i class="fas fa-compress-arrows-alt"></i>
                            Pressure
                        </div>
                        <div class="detail-value" id="pressure">-- hPa</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

        // Initialize the globe
        function initGlobe() {
            const globeEl = document.getElementById('globe');
            
            globe = Globe({
                rendererConfig: {
                    antialias: true,
                    alpha: true,
                    powerPreference: "high-performance"
                }
            })
                .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
                .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
                .pointOfView({ lat: 0, lng: 0, altitude: 2.5 })
                .width(window.innerWidth)
                .height(window.innerHeight)
                .enablePointerInteraction(true)
                .animateIn(true)
                (globeEl);

            // Configure globe appearance for performance
            globe
                .pointColor(d => {
                    // Color based on population size
                    if (d.population > 10000000) return '#ea4335'; // Red for mega cities
                    if (d.population > 5000000) return '#fbbc04';  // Orange for large cities
                    if (d.population > 1000000) return '#4285f4';  // Blue for major cities
                    return '#34a853'; // Green for smaller cities
                })
                .pointAltitude(d => {
                    // Height based on population
                    if (d.population > 10000000) return 0.02;
                    if (d.population > 5000000) return 0.015;
                    if (d.population > 1000000) return 0.01;
                    return 0.008;
                })
                .pointRadius(d => {
                    // Size based on population and zoom
                    const baseSize = currentZoomLevel > 2 ? 0.3 : 0.5;
                    if (d.population > 10000000) return baseSize * 1.5;
                    if (d.population > 5000000) return baseSize * 1.2;
                    if (d.population > 1000000) return baseSize;
                    return baseSize * 0.8;
                })
                .pointResolution(8) // Reduced for performance
                .labelText(d => `${d.name} (${(d.population / 1000000).toFixed(1)}M)`)
                .labelColor(() => '#ffffff')
                .labelSize(d => {
                    if (currentZoomLevel < 1.5) return 1.2;
                    if (currentZoomLevel < 2) return 1;
                    return 0.8;
                })
                .labelDotRadius(0.4)
                .labelAltitude(0.01)
                .onPointClick(onCityClick)
                .onLabelClick(onCityClick);

            // Enhanced zoom handling with throttling
            globe.onZoom(throttle((coords) => {
                currentZoomLevel = coords.altitude;
                updateCitiesDisplay(coords.altitude);
                updateLocationCounter();
            }, ZOOM_THROTTLE));

            // Set initial data
            updateCitiesDisplay();
            updateLocationCounter();

            // Hide loading indicator
            document.getElementById('loading').style.display = 'none';

            // Auto-hide instructions after 10 seconds
            setTimeout(() => {
                document.getElementById('zoom-info').classList.add('hidden');
            }, 10000);

            // Performance monitoring
            const stats = setupPerformanceMonitoring();
        }

        // Throttle function for performance
        function throttle(func, limit) {
            let inThrottle;
            return function() {
                const args = arguments;
                const context = this;
                if (!inThrottle) {
                    func.apply(context, args);
                    inThrottle = true;
                    setTimeout(() => inThrottle = false, limit);
                }
            }
        }

        // Update cities display based on zoom level with smooth transitions
        function updateCitiesDisplay(altitude = 2.5) {
            let citiesToShow = [];
            
            // Dynamic loading based on zoom level
            if (altitude >= 2.5) {
                // Far view - only major world cities
                citiesToShow = worldCities.filter(city => city.zoom === 1);
            } else if (altitude >= 2.0) {
                // Medium view - major + regional cities
                citiesToShow = worldCities.filter(city => city.zoom <= 2);
            } else if (altitude >= 1.5) {
                // Close view - add more regional cities
                citiesToShow = worldCities.filter(city => city.zoom <= 3);
            } else {
                // Very close view - show all cities
                citiesToShow = worldCities;
            }
            
            // Sort by population for better rendering priority
            citiesToShow.sort((a, b) => b.population - a.population);
            
            // Update globe data with smooth transition
            globe.pointsData(citiesToShow);
            globe.labelsData(citiesToShow.filter((_, i) => i < 50)); // Limit labels for performance
        }

        // Update location counter
        function updateLocationCounter() {
            const visibleCities = globe.pointsData().length;
            document.getElementById('location-count').textContent = visibleCities;
        }

        // Handle city click with enhanced feedback
        async function onCityClick(city) {
            if (!city) return;
            
            // Visual feedback
            const popup = document.getElementById('weather-popup');
            popup.style.transform = 'translate(-50%, -50%) scale(0.8)';
            popup.style.opacity = '0.5';
            
            showWeatherPopup(city.name);
            await fetchWeatherData(city.name, city.country);
        }

        // Enhanced weather data fetching with better error handling
        async function fetchWeatherData(cityName, countryCode = '') {
            try {
                const query = countryCode ? `${cityName},${countryCode}` : cityName;
                const response = await fetch(
                    `${BASE_URL}?q=${encodeURIComponent(query)}&appid=${API_KEY}&units=metric`,
                    { 
                        signal: AbortSignal.timeout(5000) // 5 second timeout
                    }
                );
                
                if (!response.ok) {
                    throw new Error(`Weather data not found (${response.status})`);
                }
                
                const data = await response.json();
                displayWeatherData(data);
                
            } catch (error) {
                console.error('Error fetching weather data:', error);
                displayWeatherError(error.message);
            }
        }

        // Enhanced weather data display
        function displayWeatherData(data) {
            const cityName = data.name;
            const countryName = data.sys.country;
            const temp = Math.round(data.main.temp);
            const feelsLike = Math.round(data.main.feels_like);
            const description = data.weather[0].description;
            const humidity = data.main.humidity;
            const windSpeed = Math.round(data.wind.speed * 10) / 10; // Round to 1 decimal
            const pressure = data.main.pressure;
            const iconCode = data.weather[0].icon;
            
            // Update popup content
            document.getElementById('popup-city').textContent = cityName;
            document.getElementById('weather-temp').textContent = `${temp}°C`;
            document.getElementById('weather-desc').textContent = description;
            document.getElementById('location-info').textContent = `${cityName}, ${countryName}`;
            document.getElementById('feels-like').textContent = `${feelsLike}°C`;
            document.getElementById('humidity').textContent = `${humidity}%`;
            document.getElementById('wind-speed').textContent = `${windSpeed} m/s`;
            document.getElementById('pressure').textContent = `${pressure} hPa`;
            
            // High-resolution weather icon
            const iconUrl = `https://openweathermap.org/img/wn/${iconCode}@4x.png`;
            const weatherIcon = document.getElementById('weather-icon');
            weatherIcon.src = iconUrl;
            weatherIcon.alt = description;
            
            // Smooth popup animation
            const popup = document.getElementById('weather-popup');
            popup.style.transform = 'translate(-50%, -50%) scale(1)';
            popup.style.opacity = '1';
        }

        // Enhanced error display
        function displayWeatherError(errorMessage = 'Weather data unavailable') {
            document.getElementById('weather-temp').textContent = '--°';
            document.getElementById('weather-desc').textContent = errorMessage;
            document.getElementById('location-info').textContent = 'Please try another location';
            document.getElementById('feels-like').textContent = '--°';
            document.getElementById('humidity').textContent = '--%';
            document.getElementById('wind-speed').textContent = '-- m/s';
            document.getElementById('pressure').textContent = '-- hPa';
            document.getElementById('weather-icon').src = '';
            
            // Show popup even with error
            const popup = document.getElementById('weather-popup');
            popup.style.transform = 'translate(-50%, -50%) scale(1)';
            popup.style.opacity = '1';
        }

        // Show weather popup with animation
        function showWeatherPopup(cityName) {
            document.getElementById('popup-city').textContent = cityName;
            document.getElementById('weather-popup').classList.add('show');
        }

        // Close weather popup
        function closeWeatherPopup() {
            document.getElementById('weather-popup').classList.remove('show');
        }

        // Reset globe to initial view
        function resetGlobe() {
            globe.pointOfView({ lat: 0, lng: 0, altitude: 2.5 }, 1500);
            currentZoomLevel = 2.5;
            setTimeout(() => {
                updateCitiesDisplay();
                updateLocationCounter();
            }, 1000);
        }

        // Toggle auto rotation
        function toggleAnimation() {
            autoRotate = !autoRotate;
            const icon = document.getElementById('animation-icon');
            const text = document.getElementById('animation-text');
            const btn = document.getElementById('auto-rotate-btn');
            
            if (autoRotate) {
                startAutoRotation();
                icon.className = 'fas fa-pause';
                text.textContent = 'Pause';
                btn.classList.add('active');
            } else {
                stopAutoRotation();
                icon.className = 'fas fa-play';
                text.textContent = 'Auto';
                btn.classList.remove('active');
            }
        }

        // Start auto rotation
        function startAutoRotation() {
            globe.controls().autoRotate = true;
            globe.controls().autoRotateSpeed = 0.5;
        }

        // Stop auto rotation
        function stopAutoRotation() {
            globe.controls().autoRotate = false;
        }

        // Toggle UI visibility
        function toggleUI() {
            uiVisible = !uiVisible;
            const header = document.getElementById('header');
            const zoomInfo = document.getElementById('zoom-info');
            const locationCounter = document.getElementById('location-counter');
            const icon = document.getElementById('ui-icon');
            const text = document.getElementById('ui-text');
            
            if (uiVisible) {
                header.classList.remove('collapsed');
                zoomInfo.classList.remove('hidden');
                locationCounter.style.opacity = '1';
                icon.className = 'fas fa-eye';
                text.textContent = 'Hide UI';
            } else {
                header.classList.add('collapsed');
                zoomInfo.classList.add('hidden');
                locationCounter.style.opacity = '0';
                icon.className = 'fas fa-eye-slash';
                text.textContent = 'Show UI';
            }
        }

        // Handle window resize with debouncing
        const handleResize = throttle(() => {
            if (globe) {
                globe.width(window.innerWidth).height(window.innerHeight);
            }
        }, 250);

        // Performance monitoring
        function setupPerformanceMonitoring() {
            let frameCount = 0;
            let lastTime = performance.now();
            
            function checkPerformance() {
                frameCount++;
                const currentTime = performance.now();
                
                if (currentTime - lastTime >= 1000) {
                    const fps = Math.round((frameCount * 1000) / (currentTime - lastTime));
                    
                    // Adjust quality based on performance
                    if (fps < 30) {
                        // Reduce quality for better performance
                        globe.pointResolution(6);
                        globe.labelSize(0.6);
                    } else if (fps > 50) {
                        // Increase quality if performance allows
                        globe.pointResolution(8);
                        globe.labelSize(0.8);
                    }
                    
                    frameCount = 0;
                    lastTime = currentTime;
                }
                
                requestAnimationFrame(checkPerformance);
            }
            
            checkPerformance();
        }

        // Event listeners
        window.addEventListener('resize', handleResize);
        
        // Close popup on outside click
        document.addEventListener('click', (e) => {
            const popup = document.getElementById('weather-popup');
            const globe = document.getElementById('globe');
            if (!popup.contains(e.target) && !globe.contains(e.target)) {
                closeWeatherPopup();
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'Escape':
                    closeWeatherPopup();
                    break;
                case ' ':
                    e.preventDefault();
                    toggleAnimation();
                    break;
                case 'r':
                case 'R':
                    resetGlobe();
                    break;
                case 'h':
                case 'H':
                    toggleUI();
                    break;
            }
        });

        // Initialize when page loads
        window.addEventListener('load', () => {
            // Small delay to ensure all resources are loaded
            setTimeout(initGlobe, 300);
        });

        // Prevent context menu on globe
        document.getElementById('globe').addEventListener('contextmenu', e => e.preventDefault());
    </script>
