    <style>
        :root {
            --bg-dark: #0a0a0a;
            --bg-surface: #1a1a1a;
            --bg-elevated: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --accent-blue: #4f9eff;
            --accent-purple: #8b5cf6;
            --accent-green: #10b981;
            --gradient-primary: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --shadow-glow: 0 0 30px rgba(102, 126, 234, 0.3);
            --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
        }

        .weather-app {
            position: relative;
            min-height: 100vh;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(26, 26, 26, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header-controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .home-link {
            color: var(--text-secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .home-link:hover {
            color: var(--text-primary);
            background: var(--glass-bg);
        }

        .globe-container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        #globe {
            width: 100%;
            height: 100%;
        }

        .weather-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: var(--bg-surface);
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(20px);
            z-index: 2000;
            max-width: 400px;
            width: 90%;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0;
        }

        .weather-popup.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .popup-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s ease;
        }

        .close-btn:hover {
            color: var(--text-primary);
        }

        .weather-content {
            text-align: center;
        }

        .weather-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1rem;
        }

        .temperature {
            font-size: 3rem;
            font-weight: 700;
            color: var(--accent-blue);
            margin-bottom: 0.5rem;
        }

        .description {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            text-transform: capitalize;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .detail-item {
            background: var(--bg-elevated);
            border-radius: 12px;
            padding: 1rem;
            text-align: center;
            border: 1px solid var(--glass-border);
        }

        .detail-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .detail-value {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .controls {
            position: fixed;
            bottom: 2rem;
            left: 2rem;
            right: 2rem;
            display: flex;
            justify-content: center;
            gap: 1rem;
            z-index: 1000;
        }

        .control-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 1rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(20px);
            font-size: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .control-btn:hover {
            background: var(--bg-elevated);
            transform: translateY(-2px);
            box-shadow: var(--shadow-soft);
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 1500;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 3px solid var(--glass-border);
            border-top: 3px solid var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .instructions {
            position: fixed;
            top: 50%;
            left: 2rem;
            transform: translateY(-50%);
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid var(--glass-border);
            max-width: 250px;
            z-index: 500;
            opacity: 0.9;
        }

        .instructions h3 {
            color: var(--accent-blue);
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }

        .instructions ul {
            list-style: none;
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .instructions li {
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .instructions i {
            color: var(--accent-green);
            width: 16px;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .header {
                padding: 1rem;
            }

            .header h1 {
                font-size: 1.2rem;
            }

            .instructions {
                position: static;
                margin: 1rem;
                max-width: none;
            }

            .controls {
                bottom: 1rem;
                left: 1rem;
                right: 1rem;
                flex-wrap: wrap;
            }

            .control-btn {
                flex: 1;
                min-width: 120px;
                justify-content: center;
            }

            .weather-popup {
                max-width: 350px;
                padding: 1.5rem;
            }

            .temperature {
                font-size: 2.5rem;
            }
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 1rem;
            }

            .weather-details {
                grid-template-columns: 1fr;
            }

            .controls {
                gap: 0.5rem;
            }

            .control-btn {
                padding: 0.8rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>

        // Initialize the globe
        function initGlobe() {
            const globeEl = document.getElementById('globe');
            
            globe = Globe()
                .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-night.jpg')
                .backgroundImageUrl('https://unpkg.com/three-globe/example/img/night-sky.png')
                .pointOfView({ altitude: 2.5 })
                .width(window.innerWidth)
                .height(window.innerHeight)
                .enablePointerInteraction(true)
                (globeEl);

            // Configure globe appearance
            globe
                .pointColor(() => '#4f9eff')
                .pointAltitude(0.01)
                .pointRadius(0.5)
                .pointResolution(12)
                .labelText('name')
                .labelColor(() => '#ffffff')
                .labelSize(1.5)
                .labelDotRadius(0.8)
                .labelAltitude(0.02)
                .onPointClick(onCityClick)
                .onLabelClick(onCityClick);

            // Set initial data
            updateCitiesDisplay();

            // Handle zoom events
            globe.onZoom((coords) => {
                updateCitiesDisplay(coords.altitude);
            });

            // Hide loading indicator
            document.getElementById('loading').style.display = 'none';

            // Start auto rotation if enabled
            if (autoRotate) {
                startAutoRotation();
            }
        }

        // Update cities display based on zoom level
        function updateCitiesDisplay(altitude = 2.5) {
            let citiesToShow = [...majorCities];
            
            // Show additional cities when zoomed in
            if (altitude < 2.0) {
                citiesToShow = [...majorCities, ...additionalCities];
            }
            
            globe.pointsData(citiesToShow);
            globe.labelsData(citiesToShow);
        }

        // Handle city click
        async function onCityClick(city) {
            if (!city) return;
            
            showWeatherPopup(city.name);
            await fetchWeatherData(city.name);
        }

        // Fetch weather data from OpenWeatherMap API
        async function fetchWeatherData(cityName) {
            try {
                const response = await fetch(
                    `${BASE_URL}?q=${encodeURIComponent(cityName)}&appid=${API_KEY}&units=metric`
                );
                
                if (!response.ok) {
                    throw new Error('Weather data not found');
                }
                
                const data = await response.json();
                displayWeatherData(data);
                
            } catch (error) {
                console.error('Error fetching weather data:', error);
                displayWeatherError();
            }
        }

        // Display weather data in popup
        function displayWeatherData(data) {
            const cityName = `${data.name}, ${data.sys.country}`;
            const temp = Math.round(data.main.temp);
            const feelsLike = Math.round(data.main.feels_like);
            const description = data.weather[0].description;
            const humidity = data.main.humidity;
            const windSpeed = data.wind.speed;
            const pressure = data.main.pressure;
            const iconCode = data.weather[0].icon;
            
            document.getElementById('popup-city').textContent = cityName;
            document.getElementById('weather-temp').textContent = `${temp}°C`;
            document.getElementById('weather-desc').textContent = description;
            document.getElementById('feels-like').textContent = `${feelsLike}°C`;
            document.getElementById('humidity').textContent = `${humidity}%`;
            document.getElementById('wind-speed').textContent = `${windSpeed} m/s`;
            document.getElementById('pressure').textContent = `${pressure} hPa`;
            document.getElementById('weather-icon').src = 
                `https://openweathermap.org/img/wn/${iconCode}@2x.png`;
        }

        // Display weather error
        function displayWeatherError() {
            document.getElementById('weather-temp').textContent = '--°';
            document.getElementById('weather-desc').textContent = 'Weather data unavailable';
            document.getElementById('feels-like').textContent = '--°';
            document.getElementById('humidity').textContent = '--%';
            document.getElementById('wind-speed').textContent = '-- m/s';
            document.getElementById('pressure').textContent = '-- hPa';
        }

        // Show weather popup
        function showWeatherPopup(cityName) {
            document.getElementById('popup-city').textContent = cityName;
            document.getElementById('weather-popup').classList.add('show');
        }

        // Close weather popup
        function closeWeatherPopup() {
            document.getElementById('weather-popup').classList.remove('show');
        }

        // Reset globe view
        function resetGlobe() {
            globe.pointOfView({ altitude: 2.5 }, 1000);
        }

        // Toggle auto rotation
        function toggleAnimation() {
            autoRotate = !autoRotate;
            const icon = document.getElementById('animation-icon');
            const text = document.getElementById('animation-text');
            
            if (autoRotate) {
                startAutoRotation();
                icon.className = 'fas fa-pause';
                text.textContent = 'Stop Rotate';
            } else {
                stopAutoRotation();
                icon.className = 'fas fa-play';
                text.textContent = 'Auto Rotate';
            }
        }

        // Start auto rotation
        function startAutoRotation() {
            globe.controls().autoRotate = true;
            globe.controls().autoRotateSpeed = 0.5;
        }

        // Stop auto rotation
        function stopAutoRotation() {
            globe.controls().autoRotate = false;
        }

        // Handle window resize
        function handleResize() {
            if (globe) {
                globe.width(window.innerWidth).height(window.innerHeight);
            }
        }

        // Event listeners
        window.addEventListener('resize', handleResize);
        
        // Close popup when clicking outside
        document.addEventListener('click', (e) => {
            const popup = document.getElementById('weather-popup');
            if (!popup.contains(e.target) && !e.target.closest('#globe')) {
                closeWeatherPopup();
            }
        });

        // Initialize when page loads
        window.addEventListener('load', () => {
            setTimeout(initGlobe, 500); // Small delay to ensure all resources are loaded
        });

        // Handle escape key to close popup
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeWeatherPopup();
            }
        });
    </script>
</body>
</html>
