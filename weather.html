        :root {
            --bg-dark: #0a0a0a;
            --bg-surface: #1a1a1a;
            --bg-elevated: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --accent-blue: #4285f4;
            --accent-green: #34a853;
            --accent-orange: #fbbc04;
            --accent-red: #ea4335;
            --gradient-primary: linear-gradient(135deg, #4285f4 0%, #34a853 100%);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --shadow-soft: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
            user-select: none;
        }

        .weather-app {
            position: relative;
            height: 100vh;
            background: radial-gradient(ellipse at center, #0f1419 0%, #0a0e13 50%, #050810 100%);
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            padding: 0.8rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .header.collapsed {
            transform: translateY(-100%);
        }

        .header h1 {
            font-size: 1.3rem;
            font-weight: 600;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .home-link {
            color: var(--text-secondary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .home-link:hover {
            color: var(--text-primary);
            background: var(--glass-bg);
        }

        .globe-container {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
            cursor: grab;
        }

        .globe-container:active {
            cursor: grabbing;
        }

        #globe {
            width: 100%;
            height: 100%;
            background: transparent;
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 1500;
            background: var(--bg-surface);
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            transition: all 0.3s ease;
        }

        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--glass-border);
            border-top: 3px solid var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .controls {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            z-index: 1000;
        }

        .control-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            padding: 0.8rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(20px);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            min-width: 120px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .control-btn:hover {
            background: var(--bg-elevated);
            transform: translateY(-2px);
            box-shadow: var(--shadow-soft);
        }

        .control-btn.active {
            background: var(--accent-blue);
            color: white;
        }

        .location-counter {
            position: fixed;
            top: 80px;
            right: 1.5rem;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: 10px;
            padding: 0.8rem 1.2rem;
            border: 1px solid var(--glass-border);
            z-index: 500;
            font-size: 0.9rem;
            color: var(--text-secondary);
            transition: all 0.3s ease;
        }

        .location-counter .count {
            color: var(--accent-blue);
            font-weight: 600;
        }

        .weather-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: var(--bg-surface);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-soft);
            backdrop-filter: blur(24px);
            z-index: 2000;
            max-width: 380px;
            width: 90%;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0;
        }

        .weather-popup.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
        }

        .popup-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .close-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.3rem;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            color: var(--text-primary);
            background: var(--glass-bg);
        }

        .weather-content {
            text-align: center;
        }

        .weather-main {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.2rem;
        }

        .weather-icon {
            width: 64px;
            height: 64px;
            filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.3));
        }

        .weather-info {
            flex: 1;
            text-align: left;
        }

        .temperature {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--accent-blue);
            margin-bottom: 0.2rem;
            line-height: 1;
        }

        .description {
            font-size: 1rem;
            color: var(--text-secondary);
            text-transform: capitalize;
            margin-bottom: 0.3rem;
        }

        .location-info {
            font-size: 0.85rem;
            color: var(--text-secondary);
            opacity: 0.8;
        }

        .weather-details {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.8rem;
        }

        .detail-item {
            background: var(--bg-elevated);
            border-radius: 10px;
            padding: 0.8rem;
            text-align: center;
            border: 1px solid var(--glass-border);
            transition: all 0.3s ease;
        }

        .detail-item:hover {
            background: rgba(255, 255, 255, 0.05);
            transform: translateY(-1px);
        }

        .detail-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 0.3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
        }

        .detail-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

            .header {
                padding: 0.6rem 1rem;
            }

            .header h1 {
                font-size: 1.1rem;
            }

            .controls {
                bottom: 1rem;
                right: 1rem;
                left: 1rem;
                flex-direction: row;
                justify-content: center;
                flex-wrap: wrap;
            }

            .control-btn {
                flex: 1;
                min-width: 100px;
                font-size: 0.8rem;
                padding: 0.7rem;
            }

            .weather-popup {
                max-width: 340px;
                padding: 1.2rem;
            }

            .temperature {
                font-size: 2.2rem;
            }

            .location-counter {
                top: auto;
                bottom: 5rem;
                right: 1rem;
                left: auto;
            }
        }

        @media (max-width: 480px) {
            .weather-details {
                grid-template-columns: 1fr;
            }

            .weather-main {
                flex-direction: column;
                text-align: center;
            }

            .weather-info {
                text-align: center;
            }
        }

        /* Performance optimizations */
        .globe-container canvas {
            will-change: transform;
        }

        .weather-popup {
            will-change: transform, opacity;
        }

        /* Smooth scrollbar for mobile */
        ::-webkit-scrollbar {
            display: none;
        }

        html {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body>
    <div class="weather-app">
        <!-- Header -->
        <header class="header" id="header">
            <h1>
                <i class="fas fa-globe-americas"></i>
                3D Weather Globe
            </h1>
            <div class="header-controls">
                <a href="index.html" class="home-link">
                    <i class="fas fa-arrow-left"></i>
                    Back to News
                </a>
            </div>
        </header>

        <!-- Globe Container -->
        <div class="globe-container">
            <div id="globe"></div>
        </div>

        <!-- Location Counter -->
        <div class="location-counter" id="location-counter">
            <span class="count" id="location-count">0</span> locations visible
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="control-btn" onclick="resetGlobe()" title="Reset View">
                <i class="fas fa-home"></i> Reset
            </button>
            <button class="control-btn" id="auto-rotate-btn" onclick="toggleAnimation()" title="Auto Rotate">
                <i class="fas fa-play" id="animation-icon"></i> <span id="animation-text">Auto</span>
            </button>
            <button class="control-btn" onclick="toggleUI()" title="Toggle UI">
                <i class="fas fa-eye" id="ui-icon"></i> <span id="ui-text">Hide UI</span>
            </button>
        </div>

        <!-- Loading Indicator -->
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
            <p>Loading 3D Earth Globe...</p>
        </div>

        <!-- Weather Popup -->
        <div class="weather-popup" id="weather-popup">
            <div class="popup-header">
                <div class="popup-title">
                    <i class="fas fa-cloud-sun"></i>
                    <span id="popup-city">Weather Info</span>
                </div>
                <button class="close-btn" onclick="closeWeatherPopup()" title="Close">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="weather-content">
                <div class="weather-main">
                    <img class="weather-icon" id="weather-icon" src="" alt="Weather Icon">
                    <div class="weather-info">
                        <div class="temperature" id="weather-temp">--°</div>
                        <div class="description" id="weather-desc">Loading...</div>
                        <div class="location-info" id="location-info">--</div>
                    </div>
                </div>
                <div class="weather-details">
                    <div class="detail-item">
                        <div class="detail-label">
                            <i class="fas fa-thermometer-half"></i>
                            Feels like
                        </div>
                        <div class="detail-value" id="feels-like">--°</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">
                            <i class="fas fa-tint"></i>
                            Humidity
                        </div>
                        <div class="detail-value" id="humidity">--%</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">
                            <i class="fas fa-wind"></i>
                            Wind Speed
                        </div>
                        <div class="detail-value" id="wind-speed">-- m/s</div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label">
                            <i class="fas fa-compress-arrows-alt"></i>
                            Pressure
                        </div>
                        <div class="detail-value" id="pressure">-- hPa</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

        // Fast initialization function
        function initGlobe() {
            const globeEl = document.getElementById('globe');
            
            // Create globe with optimized settings for speed
            globe = Globe({
                rendererConfig: {
                    antialias: false, // Disable for speed
                    alpha: true,
                    powerPreference: "high-performance"
                }
            })
                (globeEl);

            // Configure for fast loading
            globe
                .globeImageUrl('//unpkg.com/three-globe/example/img/earth-day.jpg') // Smaller day texture
                .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')
                .pointOfView({ lat: 20, lng: 0, altitude: 2.5 })
                .width(window.innerWidth)
                .height(window.innerHeight)
                .enablePointerInteraction(true)
                .showAtmosphere(true)
                .atmosphereColor('#4285f4')
                .atmosphereAltitude(0.1);

            // Optimized point rendering
            globe
                .pointColor(d => {
                    if (d.population > 10000000) return '#ea4335';
                    if (d.population > 5000000) return '#fbbc04';
                    if (d.population > 1000000) return '#4285f4';
                    return '#34a853';
                })
                .pointAltitude(0.01)
                .pointRadius(d => {
                    if (d.population > 10000000) return 0.4;
                    if (d.population > 5000000) return 0.3;
                    return 0.25;
                })
                .pointResolution(6)
                .labelText(d => d.name)
                .labelColor(() => '#ffffff')
                .labelSize(0.8)
                .labelDotRadius(0.3)
                .labelAltitude(0.01)
                .onPointClick(onCityClick)
                .onLabelClick(onCityClick);

            // Set initial data - start with major cities only
            updateCitiesDisplay(2.5);

            // Setup zoom handler
            globe.onZoom((coords) => {
                currentZoomLevel = coords.altitude;
                updateCitiesDisplay(coords.altitude);
                updateLocationCounter();
            });

            // Hide loading and show globe
            setTimeout(() => {
                document.getElementById('loading').classList.add('hidden');
                updateLocationCounter();
            }, 500);
        }

        // Fast city display update
        function updateCitiesDisplay(altitude = 2.5) {
            let citiesToShow;
            
            if (altitude >= 2.0) {
                citiesToShow = majorCities.slice(0, 24); // Major cities only
            } else if (altitude >= 1.5) {
                citiesToShow = majorCities; // All major cities
            } else {
                citiesToShow = [...majorCities, ...additionalCities.slice(0, 20)]; // Add more cities
            }
            
            globe.pointsData(citiesToShow);
            globe.labelsData(citiesToShow.slice(0, 30)); // Limit labels
        }

        // Update location counter
        function updateLocationCounter() {
            const count = globe.pointsData().length;
            document.getElementById('location-count').textContent = count;
        }

        // Handle city click
        async function onCityClick(city) {
            if (!city) return;
            showWeatherPopup(city.name);
            await fetchWeatherData(city.name, city.country);
        }

        // Fetch weather data
        async function fetchWeatherData(cityName, countryCode = '') {
            try {
                const query = countryCode ? `${cityName},${countryCode}` : cityName;
                const response = await fetch(
                    `${BASE_URL}?q=${encodeURIComponent(query)}&appid=${API_KEY}&units=metric`,
                    { signal: AbortSignal.timeout(5000) }
                );
                
                if (!response.ok) throw new Error('Weather data not found');
                
                const data = await response.json();
                displayWeatherData(data);
                
            } catch (error) {
                console.error('Error:', error);
                displayWeatherError(error.message);
            }
        }

        // Display weather data
        function displayWeatherData(data) {
            document.getElementById('popup-city').textContent = data.name;
            document.getElementById('weather-temp').textContent = `${Math.round(data.main.temp)}°C`;
            document.getElementById('weather-desc').textContent = data.weather[0].description;
            document.getElementById('location-info').textContent = `${data.name}, ${data.sys.country}`;
            document.getElementById('feels-like').textContent = `${Math.round(data.main.feels_like)}°C`;
            document.getElementById('humidity').textContent = `${data.main.humidity}%`;
            document.getElementById('wind-speed').textContent = `${data.wind.speed} m/s`;
            document.getElementById('pressure').textContent = `${data.main.pressure} hPa`;
            
            const iconUrl = `https://openweathermap.org/img/wn/${data.weather[0].icon}@2x.png`;
            document.getElementById('weather-icon').src = iconUrl;
        }

        // Display error
        function displayWeatherError(message = 'Weather data unavailable') {
            document.getElementById('weather-temp').textContent = '--°';
            document.getElementById('weather-desc').textContent = message;
            document.getElementById('location-info').textContent = 'Please try another location';
            document.getElementById('feels-like').textContent = '--°';
            document.getElementById('humidity').textContent = '--%';
            document.getElementById('wind-speed').textContent = '-- m/s';
            document.getElementById('pressure').textContent = '-- hPa';
        }

        // Show weather popup
        function showWeatherPopup(cityName) {
            document.getElementById('popup-city').textContent = cityName;
            document.getElementById('weather-popup').classList.add('show');
        }

        // Close weather popup
        function closeWeatherPopup() {
            document.getElementById('weather-popup').classList.remove('show');
        }

        // Reset globe
        function resetGlobe() {
            globe.pointOfView({ lat: 20, lng: 0, altitude: 2.5 }, 1000);
            currentZoomLevel = 2.5;
            setTimeout(() => {
                updateCitiesDisplay();
                updateLocationCounter();
            }, 500);
        }

        // Toggle auto rotation
        function toggleAnimation() {
            autoRotate = !autoRotate;
            const icon = document.getElementById('animation-icon');
            const text = document.getElementById('animation-text');
            const btn = document.getElementById('auto-rotate-btn');
            
            if (autoRotate) {
                globe.controls().autoRotate = true;
                globe.controls().autoRotateSpeed = 0.5;
                icon.className = 'fas fa-pause';
                text.textContent = 'Pause';
                btn.classList.add('active');
            } else {
                globe.controls().autoRotate = false;
                icon.className = 'fas fa-play';
                text.textContent = 'Auto';
                btn.classList.remove('active');
            }
        }

        // Toggle UI
        function toggleUI() {
            uiVisible = !uiVisible;
            const header = document.getElementById('header');
            const locationCounter = document.getElementById('location-counter');
            const icon = document.getElementById('ui-icon');
            const text = document.getElementById('ui-text');
            
            if (uiVisible) {
                header.classList.remove('collapsed');
                locationCounter.style.opacity = '1';
                icon.className = 'fas fa-eye';
                text.textContent = 'Hide UI';
            } else {
                header.classList.add('collapsed');
                locationCounter.style.opacity = '0';
                icon.className = 'fas fa-eye-slash';
                text.textContent = 'Show UI';
            }
        }

        // Handle window resize
        function handleResize() {
            if (globe) {
                globe.width(window.innerWidth).height(window.innerHeight);
            }
        }

        // Event listeners
        window.addEventListener('resize', handleResize);
        
        // Close popup on outside click
        document.addEventListener('click', (e) => {
            const popup = document.getElementById('weather-popup');
            if (!popup.contains(e.target) && !e.target.closest('#globe')) {
                closeWeatherPopup();
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'Escape':
                    closeWeatherPopup();
                    break;
                case ' ':
                    e.preventDefault();
                    toggleAnimation();
                    break;
                case 'r':
                case 'R':
                    resetGlobe();
                    break;
                case 'h':
                case 'H':
                    toggleUI();
                    break;
            }
        });

        // Initialize when DOM is ready
        document.addEventListener('DOMContentLoaded', () => {
            // Immediate initialization for fast loading
            initGlobe();
        });

        // Prevent context menu
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
