<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Globe - Brightlens News</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0c1421 0%, #1a1a2e 100%);
            color: white;
            overflow: hidden;
            height: 100vh;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #4CAF50, #2196F3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .home-link {
            color: #ccc;
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .home-link:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        #globe {
            width: 100vw;
            height: 100vh;
            cursor: grab;
        }

        #globe:active {
            cursor: grabbing;
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 2000;
            background: rgba(0, 0, 0, 0.9);
            padding: 2rem 3rem;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .loading h2 {
            margin-bottom: 1rem;
            color: #4CAF50;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #4CAF50;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 1rem auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .info-panel {
            position: fixed;
            top: 80px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 500;
            min-width: 250px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .info-label {
            color: #ccc;
        }

        .info-value {
            color: #4CAF50;
            font-weight: 600;
        }

        .weather-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 2rem;
            border: 2px solid rgba(76, 175, 80, 0.3);
            z-index: 3000;
            min-width: 400px;
            max-width: 90vw;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0;
        }

        .weather-popup.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }

        .popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 1rem;
        }

        .popup-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #4CAF50;
        }

        .close-btn {
            background: none;
            border: none;
            color: #ccc;
            font-size: 1.5rem;
            cursor: pointer;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .weather-main {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 1.5rem;
            margin-bottom: 2rem;
            align-items: center;
        }

        .weather-icon {
            width: 80px;
            height: 80px;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.5));
        }

        .weather-info {
            text-align: left;
        }

        .temperature {
            font-size: 2.5rem;
            font-weight: 700;
            color: #2196F3;
            margin-bottom: 0.5rem;
        }

        .condition {
            font-size: 1.1rem;
            color: #ccc;
            text-transform: capitalize;
            margin-bottom: 0.3rem;
        }

        .location-details {
            font-size: 0.9rem;
            color: #888;
        }

        .weather-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .stat-icon {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            color: #4CAF50;
        }

        .stat-label {
            font-size: 0.8rem;
            color: #ccc;
            margin-bottom: 0.3rem;
        }

        .stat-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }

        .control-btn {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0.8rem 1.2rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .control-btn:hover {
            background: rgba(76, 175, 80, 0.2);
            border-color: #4CAF50;
            transform: translateY(-2px);
        }

        .control-btn.active {
            background: rgba(76, 175, 80, 0.3);
            border-color: #4CAF50;
        }

        .search-container {
            position: fixed;
            top: 80px;
            left: 20px;
            z-index: 1000;
        }

        .search-input {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 0.8rem 1rem;
            border-radius: 10px;
            width: 250px;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
        }

        .search-input::placeholder {
            color: #888;
        }

        .search-input:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 0 2px rgba(76, 175, 80, 0.2);
        }

        /* Mobile responsive */
        @media (max-width: 768px) {
            .header {
                padding: 1rem;
            }
            
            .header h1 {
                font-size: 1.2rem;
            }
            
            .weather-popup {
                min-width: 300px;
                padding: 1.5rem;
            }
            
            .weather-main {
                grid-template-columns: 1fr;
                text-align: center;
            }
            
            .temperature {
                font-size: 2rem;
            }
            
            .search-input {
                width: 200px;
            }
            
            .controls {
                bottom: 10px;
                right: 10px;
                left: 10px;
                flex-direction: row;
                justify-content: center;
                flex-wrap: wrap;
            }
            
            .control-btn {
                flex: 1;
                min-width: 100px;
            }
        }
    </style>
</head>

    <div class="header">
        <h1>🌍 Interactive Weather Globe</h1>
        <a href="index.html" class="home-link">← Back to News</a>
    </div>

    <div class="search-container">
        <input type="text" class="search-input" placeholder="Search for a city..." id="search-input">
    </div>

    <div class="info-panel">
        <div class="info-item">
            <span class="info-label">Zoom Level:</span>
            <span class="info-value" id="zoom-level">World</span>
        </div>
        <div class="info-item">
            <span class="info-label">Locations:</span>
            <span class="info-value" id="location-count">0</span>
        </div>
        <div class="info-item">
            <span class="info-label">Status:</span>
            <span class="info-value" id="status">Loading...</span>
        </div>
    </div>

    <div class="loading" id="loading">
        <h2>Loading 3D Earth</h2>
        <div class="loading-spinner"></div>
        <p>Preparing your weather experience...</p>
    </div>

    <div id="globe"></div>

    <div class="weather-popup" id="weather-popup">
        <div class="popup-header">
            <div class="popup-title" id="location-name">Weather Information</div>
            <button class="close-btn" onclick="closeWeather()">×</button>
        </div>
        
        <div class="weather-main">
            <img id="weather-icon" class="weather-icon" src="" alt="">
            <div class="weather-info">
                <div class="temperature" id="temperature">--°</div>
                <div class="condition" id="condition">Loading...</div>
                <div class="location-details" id="location-details">--</div>
            </div>
        </div>
        
        <div class="weather-stats">
            <div class="stat-card">
                <div class="stat-icon">🌡️</div>
                <div class="stat-label">Feels Like</div>
                <div class="stat-value" id="feels-like">--°</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💧</div>
                <div class="stat-label">Humidity</div>
                <div class="stat-value" id="humidity">--%</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💨</div>
                <div class="stat-label">Wind Speed</div>
                <div class="stat-value" id="wind-speed">-- km/h</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">👁️</div>
                <div class="stat-label">Visibility</div>
                <div class="stat-value" id="visibility">-- km</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📊</div>
                <div class="stat-label">Pressure</div>
                <div class="stat-value" id="pressure">-- hPa</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">☀️</div>
                <div class="stat-label">UV Index</div>
                <div class="stat-value" id="uv-index">--</div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="control-btn" onclick="resetView()">
            🏠 Reset View
        </button>
        <button class="control-btn" id="rotate-btn" onclick="toggleRotation()">
            ▶️ Auto Rotate
        </button>
        <button class="control-btn" id="labels-btn" onclick="toggleLabels()">
            🏷️ Toggle Labels
        </button>
    </div>

        function getLocationColor(location) {
            if (location.type === "mega") return '#ff4444';      // Red for megacities
            if (location.type === "major") return '#ff8800';     // Orange for major cities
            if (location.type === "city") return '#4488ff';      // Blue for cities
            return '#44ff44';                                    // Green for towns
        }

        function getLocationSize(location) {
            if (location.type === "mega") return 0.6;
            if (location.type === "major") return 0.4;
            if (location.type === "city") return 0.3;
            return 0.25;
        }

        function getCitiesForZoom(altitude) {
            let cities = [...worldCities];
            
            if (altitude <= 2.0) {
                cities = cities.concat(regionalCities);
            }
            
            if (altitude <= 1.0) {
                cities = cities.concat(localCities);
            }
            
            return cities;
        }

        function getZoomLevelName(altitude) {
            if (altitude >= 2.5) return "World";
            if (altitude >= 2.0) return "Continental";
            if (altitude >= 1.0) return "Regional";
            return "Local";
        }

        function updateStatus(message) {
            document.getElementById('status').textContent = message;
            console.log('Status:', message);
        }

        function updateLocationCount(count) {
            document.getElementById('location-count').textContent = count;
        }

        function updateZoomLevel(altitude) {
            document.getElementById('zoom-level').textContent = getZoomLevelName(altitude);
        }

        async function initGlobe() {
            try {
                updateStatus('Initializing...');

                // Check if libraries loaded
                if (typeof THREE === 'undefined') {
                    throw new Error('Three.js library failed to load');
                }
                if (typeof Globe === 'undefined') {
                    throw new Error('Globe.gl library failed to load');
                }

                updateStatus('Creating globe...');

                                 // Create the globe with geographical boundaries
                 globe = Globe()
                     .globeImageUrl('//unpkg.com/three-globe/example/img/earth-day.jpg')
                     .backgroundImageUrl('//unpkg.com/three-globe/example/img/night-sky.png')
                     .pointsData(getCitiesForZoom(2.5))
                     .pointColor(getLocationColor)
                     .pointAltitude(0.01)
                     .pointRadius(getLocationSize)
                     .labelText(d => d.name)
                     .labelColor(() => '#ffffff')
                     .labelSize(1.2)
                     .labelDotRadius(0.4)
                     .labelAltitude(0.01)
                     .onPointClick(handleLocationClick)
                     .onLabelClick(handleLocationClick)
                     .width(window.innerWidth)
                     .height(window.innerHeight)
                     .showAtmosphere(true)
                     .atmosphereColor('#4CAF50')
                     .atmosphereAltitude(0.15)
                     // Add geographical boundaries
                     .hexPolygonsData([]) // Will be populated with country/region boundaries
                     .hexPolygonResolution(3)
                     .hexPolygonMargin(0.3)
                     .hexPolygonColor(() => 'rgba(255, 255, 255, 0.1)')
                     .hexPolygonAltitude(0.001)
                     // Add country borders
                     .pathsData([]) // Will be populated with border lines
                     .pathColor(() => '#4CAF50')
                     .pathStroke(1.5)
                     .pathAltitude(0.002)
                     (document.getElementById('globe'));

                 // Load geographical boundaries based on zoom level
                 loadGeographicalBoundaries(2.5);

                // Set initial view
                globe.pointOfView({ lat: 20, lng: 0, altitude: 2.5 });

                // Handle zoom changes
                globe.onZoom((coords) => {
                    currentAltitude = coords.altitude;
                    updateZoomLevel(coords.altitude);
                    
                    // Update cities based on zoom level
                    const cities = getCitiesForZoom(coords.altitude);
                    globe.pointsData(cities);
                    
                    // Update labels if they're enabled
                    if (showLabels) {
                        globe.labelsData(cities.slice(0, 60)); // Limit labels for performance
                    }
                    
                    updateLocationCount(cities.length);
                });

                updateStatus('Ready!');
                updateLocationCount(worldCities.length);
                updateZoomLevel(2.5);
                
                // Hide loading screen
                document.getElementById('loading').style.display = 'none';

                console.log('Globe initialized successfully');

            } catch (error) {
                updateStatus(`Error: ${error.message}`);
                console.error('Globe initialization failed:', error);
                
                // Show error message
                document.getElementById('globe').innerHTML = `
                    <div style="display: flex; align-items: center; justify-content: center; height: 100vh; color: white; text-align: center; background: rgba(0,0,0,0.8);">
                        <div>
                            <h2 style="color: #ff4444; margin-bottom: 1rem;">Failed to Load 3D Globe</h2>
                            <p style="margin-bottom: 1rem;">${error.message}</p>
                            <p style="color: #ccc;">Please refresh the page or check your internet connection.</p>
                            <button onclick="location.reload()" style="margin-top: 1rem; padding: 0.5rem 1rem; background: #4CAF50; border: none; color: white; border-radius: 5px; cursor: pointer;">
                                Retry
                            </button>
                        </div>
                    </div>
                `;
                document.getElementById('loading').style.display = 'none';
            }
        }

        async function handleLocationClick(location) {
            if (!location) return;
            
            try {
                updateStatus(`Loading weather for ${location.name}...`);
                
                // Show popup immediately with loading state
                document.getElementById('location-name').textContent = `${location.name}, ${location.country}`;
                document.getElementById('temperature').textContent = '--°';
                document.getElementById('condition').textContent = 'Loading weather data...';
                document.getElementById('location-details').textContent = `Population: ${location.pop.toLocaleString()}`;
                document.getElementById('weather-popup').classList.add('show');
                
                // Fetch weather data
                const response = await fetch(
                    `${BASE_URL}?q=${location.name},${location.country}&appid=${API_KEY}&units=metric`,
                    { timeout: 8000 }
                );
                
                if (!response.ok) {
                    throw new Error(`Weather service returned ${response.status}`);
                }
                
                const data = await response.json();
                
                // Update popup with real data
                document.getElementById('temperature').textContent = `${Math.round(data.main.temp)}°C`;
                document.getElementById('condition').textContent = data.weather[0].description;
                document.getElementById('location-details').textContent = `${data.name}, ${data.sys.country} • Population: ${location.pop.toLocaleString()}`;
                document.getElementById('feels-like').textContent = `${Math.round(data.main.feels_like)}°C`;
                document.getElementById('humidity').textContent = `${data.main.humidity}%`;
                document.getElementById('wind-speed').textContent = `${Math.round((data.wind?.speed || 0) * 3.6)} km/h`;
                document.getElementById('visibility').textContent = `${Math.round((data.visibility || 10000) / 1000)} km`;
                document.getElementById('pressure').textContent = `${data.main.pressure} hPa`;
                document.getElementById('uv-index').textContent = data.uvi || 'N/A';
                
                // Weather icon
                const iconUrl = `https://openweathermap.org/img/wn/${data.weather[0].icon}@2x.png`;
                document.getElementById('weather-icon').src = iconUrl;
                
                updateStatus('Weather loaded successfully');
                
            } catch (error) {
                console.error('Weather error:', error);
                updateStatus(`Weather error: ${error.message}`);
                
                // Show error in popup
                document.getElementById('condition').textContent = 'Weather data unavailable';
                document.getElementById('location-details').textContent = 'Please try another location or check your connection';
            }
        }

        function closeWeather() {
            document.getElementById('weather-popup').classList.remove('show');
        }

        function resetView() {
            if (globe) {
                globe.pointOfView({ lat: 20, lng: 0, altitude: 2.5 }, 1000);
                updateStatus('View reset to world level');
            }
        }

        function toggleRotation() {
            isRotating = !isRotating;
            const btn = document.getElementById('rotate-btn');
            
            if (globe) {
                globe.controls().autoRotate = isRotating;
                globe.controls().autoRotateSpeed = 0.8;
                
                if (isRotating) {
                    btn.textContent = '⏸️ Stop Rotation';
                    btn.classList.add('active');
                    updateStatus('Auto-rotation enabled');
                } else {
                    btn.textContent = '▶️ Auto Rotate';
                    btn.classList.remove('active');
                    updateStatus('Auto-rotation disabled');
                }
            }
        }

        function toggleLabels() {
            showLabels = !showLabels;
            const btn = document.getElementById('labels-btn');
            
            if (globe) {
                if (showLabels) {
                    const cities = getCitiesForZoom(currentAltitude);
                    globe.labelsData(cities.slice(0, 60));
                    btn.textContent = '🏷️ Hide Labels';
                    btn.classList.add('active');
                    updateStatus('Labels enabled');
                } else {
                    globe.labelsData([]);
                    btn.textContent = '🏷️ Show Labels';
                    btn.classList.remove('active');
                    updateStatus('Labels disabled');
                }
            }
        }

        // Search functionality
        function setupSearch() {
            const searchInput = document.getElementById('search-input');
            
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase().trim();
                if (query.length < 2) return;
                
                // Search all cities
                const allCities = [...worldCities, ...regionalCities, ...localCities];
                const matches = allCities.filter(city => 
                    city.name.toLowerCase().includes(query) ||
                    city.country.toLowerCase().includes(query)
                );
                
                if (matches.length > 0) {
                    const city = matches[0];
                    // Navigate to city
                    globe.pointOfView({
                        lat: city.lat,
                        lng: city.lng,
                        altitude: 1.5
                    }, 1500);
                    
                    // Show weather after navigation
                    setTimeout(() => {
                        handleLocationClick(city);
                    }, 1600);
                    
                    searchInput.value = '';
                }
            });
        }

        // Window resize handler
        window.addEventListener('resize', () => {
            if (globe) {
                globe.width(window.innerWidth).height(window.innerHeight);
            }
        });

        // Close popup when clicking outside
        document.addEventListener('click', (e) => {
            const popup = document.getElementById('weather-popup');
            if (popup.classList.contains('show') && !popup.contains(e.target) && !e.target.closest('#globe')) {
                closeWeather();
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.target.tagName === 'INPUT') return;
            
            switch(e.key) {
                case 'Escape':
                    closeWeather();
                    break;
                case ' ':
                    e.preventDefault();
                    toggleRotation();
                    break;
                case 'r':
                case 'R':
                    resetView();
                    break;
                case 'l':
                case 'L':
                    toggleLabels();
                    break;
            }
        });

        // Initialize everything when libraries are loaded
        function waitForLibraries() {
            if (typeof THREE !== 'undefined' && typeof Globe !== 'undefined') {
                initGlobe();
                setupSearch();
            } else {
                setTimeout(waitForLibraries, 100);
            }
        }

        // Start initialization
        document.addEventListener('DOMContentLoaded', () => {
            updateStatus('Loading libraries...');
            waitForLibraries();
        });
    </script>
