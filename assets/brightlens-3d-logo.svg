<svg width="280" height="120" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 120">
  <defs>
    <!-- Gradients for 3D effect -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="lightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
    
    <!-- Shadow filter -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background lens shape -->
  <ellipse cx="60" cy="60" rx="45" ry="45" fill="url(#primaryGrad)" filter="url(#shadow)" opacity="0.9"/>
  
  <!-- Lens highlight -->
  <ellipse cx="50" cy="45" rx="15" ry="12" fill="url(#lightGrad)" opacity="0.7"/>
  
  <!-- Lens aperture -->
  <circle cx="60" cy="60" r="25" fill="none" stroke="url(#accentGrad)" stroke-width="3"/>
  <circle cx="60" cy="60" r="15" fill="none" stroke="url(#accentGrad)" stroke-width="2" opacity="0.6"/>
  
  <!-- News lines/text representation -->
  <g transform="translate(120, 25)">
    <!-- Main title -->
    <text x="0" y="25" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="700" fill="url(#primaryGrad)">
      BrightLens
    </text>
    <text x="0" y="50" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="500" fill="url(#accentGrad)">
      NEWS
    </text>
    
    <!-- News line indicators -->
    <rect x="0" y="65" width="120" height="3" fill="url(#primaryGrad)" opacity="0.8" rx="1.5"/>
    <rect x="0" y="75" width="80" height="2" fill="url(#accentGrad)" opacity="0.6" rx="1"/>
    <rect x="0" y="83" width="100" height="2" fill="url(#primaryGrad)" opacity="0.4" rx="1"/>
  </g>
  
  <!-- Decorative elements -->
  <circle cx="25" cy="25" r="3" fill="url(#lightGrad)" opacity="0.8"/>
  <circle cx="250" cy="95" r="2" fill="url(#accentGrad)" opacity="0.6"/>
  <circle cx="270" cy="30" r="2.5" fill="url(#primaryGrad)" opacity="0.7"/>
</svg>