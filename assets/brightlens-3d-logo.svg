<svg width="320" height="140" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 140">
  <defs>
    <!-- Enhanced gradients for 3D effect -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f59e0b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="lightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#fbbf24;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0.6" />
    </linearGradient>
    
    <linearGradient id="shadowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:0.4" />
    </linearGradient>
    
    <!-- Advanced filters -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/> 
      </feMerge>
    </filter>
    
    <filter id="shadow3d" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="4" dy="8" stdDeviation="6" flood-opacity="0.4" flood-color="#1e40af"/>
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3" flood-color="#3b82f6"/>
    </filter>
    
    <filter id="shimmer" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feOffset in="coloredBlur" dx="1" dy="1" result="offsetBlur"/>
      <feMerge> 
        <feMergeNode in="offsetBlur"/>
        <feMergeNode in="SourceGraphic"/> 
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background shadow for depth -->
  <ellipse cx="70" cy="80" rx="55" ry="50" fill="url(#shadowGrad)" opacity="0.3" transform="skewX(-5) skewY(3)"/>
  
  <!-- Main lens body with 3D effect -->
  <ellipse cx="65" cy="70" rx="50" ry="48" fill="url(#primaryGrad)" filter="url(#shadow3d)" opacity="0.95"/>
  
  <!-- Lens surface reflection -->
  <ellipse cx="65" cy="70" rx="45" ry="43" fill="none" stroke="url(#lightGrad)" stroke-width="2" opacity="0.7"/>
  
  <!-- Multiple lens highlights for realism -->
  <ellipse cx="52" cy="55" rx="18" ry="15" fill="url(#lightGrad)" opacity="0.8" transform="rotate(-15 52 55)"/>
  <ellipse cx="48" cy="50" rx="8" ry="6" fill="#ffffff" opacity="0.9"/>
  <circle cx="45" cy="47" r="3" fill="#ffffff" opacity="1"/>
  
  <!-- Lens aperture with depth -->
  <circle cx="65" cy="70" r="28" fill="none" stroke="url(#accentGrad)" stroke-width="4" opacity="0.9"/>
  <circle cx="65" cy="70" r="20" fill="none" stroke="url(#accentGrad)" stroke-width="3" opacity="0.7"/>
  <circle cx="65" cy="70" r="12" fill="none" stroke="url(#accentGrad)" stroke-width="2" opacity="0.5"/>
  
  <!-- Aperture blades for realism -->
  <g transform="translate(65, 70)">
    <polygon points="-8,-14 8,-14 6,-10 -6,-10" fill="url(#primaryGrad)" opacity="0.6"/>
    <polygon points="14,-8 14,8 10,6 10,-6" fill="url(#primaryGrad)" opacity="0.6"/>
    <polygon points="8,14 -8,14 -6,10 6,10" fill="url(#primaryGrad)" opacity="0.6"/>
    <polygon points="-14,8 -14,-8 -10,-6 -10,6" fill="url(#primaryGrad)" opacity="0.6"/>
  </g>
  
  <!-- Enhanced news text with 3D effect -->
  <g transform="translate(140, 35)">
    <!-- Text shadow for depth -->
    <text x="2" y="27" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="url(#shadowGrad)" opacity="0.4">
      BrightLens
    </text>
    <text x="2" y="57" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="url(#shadowGrad)" opacity="0.4">
      NEWS
    </text>
    
    <!-- Main text -->
    <text x="0" y="25" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" fill="url(#primaryGrad)" filter="url(#glow)">
      BrightLens
    </text>
    <text x="0" y="55" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="url(#accentGrad)" filter="url(#shimmer)">
      NEWS
    </text>
    
    <!-- Enhanced news line indicators with 3D effect -->
    <rect x="1" y="73" width="140" height="4" fill="url(#shadowGrad)" opacity="0.3" rx="2"/>
    <rect x="0" y="72" width="140" height="4" fill="url(#primaryGrad)" opacity="0.9" rx="2"/>
    
    <rect x="1" y="83" width="100" height="3" fill="url(#shadowGrad)" opacity="0.3" rx="1.5"/>
    <rect x="0" y="82" width="100" height="3" fill="url(#accentGrad)" opacity="0.8" rx="1.5"/>
    
    <rect x="1" y="91" width="120" height="2" fill="url(#shadowGrad)" opacity="0.3" rx="1"/>
    <rect x="0" y="90" width="120" height="2" fill="url(#primaryGrad)" opacity="0.6" rx="1"/>
  </g>
  
  <!-- Decorative light elements -->
  <circle cx="30" cy="30" r="4" fill="url(#lightGrad)" opacity="0.9" filter="url(#glow)"/>
  <circle cx="280" cy="110" r="3" fill="url(#accentGrad)" opacity="0.8" filter="url(#glow)"/>
  <circle cx="300" cy="35" r="3.5" fill="url(#primaryGrad)" opacity="0.8" filter="url(#glow)"/>
  
  <!-- Light rays for dynamic effect -->
  <g opacity="0.4">
    <line x1="30" y1="30" x2="45" y2="15" stroke="url(#lightGrad)" stroke-width="2" opacity="0.6"/>
    <line x1="280" y1="110" x2="290" y2="95" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.6"/>
    <line x1="300" y1="35" x2="310" y2="25" stroke="url(#primaryGrad)" stroke-width="1.5" opacity="0.6"/>
  </g>
  
  <!-- Additional depth elements -->
  <ellipse cx="67" cy="72" rx="35" ry="33" fill="none" stroke="url(#primaryGrad)" stroke-width="1" opacity="0.3"/>
  <ellipse cx="63" cy="68" rx="25" ry="23" fill="none" stroke="url(#lightGrad)" stroke-width="1" opacity="0.5"/>
</svg>