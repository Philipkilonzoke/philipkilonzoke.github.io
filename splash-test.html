<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splash Screen Test - BrightLens News</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f0f0;
            margin: 0;
            padding: 20px;
        }
        .test-container {
            max-width: 600px;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            text-align: center;
        }
        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
        }
        button:hover {
            background: #1d4ed8;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>🔍 BrightLens News Splash Screen Test</h1>
        <p>This is a test page to verify the splash screen functionality.</p>
        
        <div>
            <button onclick="testSplashScreen()">🎬 Test Splash Screen</button>
            <button onclick="clearConsole()">🧹 Clear Console</button>
            <button onclick="checkFiles()">📂 Check Files</button>
        </div>
        
        <div class="status">
            <strong>Instructions:</strong><br>
            1. Open browser DevTools (F12)<br>
            2. Go to Console tab<br>
            3. Click "Test Splash Screen" button<br>
            4. Watch for console messages and splash screen display
        </div>
        
        <div id="status-output" class="status" style="margin-top: 20px;">
            Status: Ready for testing
        </div>
    </div>

    <script>
        function updateStatus(message) {
            document.getElementById('status-output').innerHTML = message;
            console.log('📊 Status:', message);
        }
        
        function testSplashScreen() {
            updateStatus('Testing splash screen...');
            console.log('🧪 Manual splash screen test initiated');
            
            if (window.showSplashScreen) {
                try {
                    window.showSplashScreen();
                    updateStatus('✅ Splash screen function called successfully');
                } catch (error) {
                    console.error('❌ Error calling splash screen:', error);
                    updateStatus('❌ Error: ' + error.message);
                }
            } else {
                console.error('❌ Splash screen function not found');
                updateStatus('❌ Splash screen function not available');
            }
        }
        
        function clearConsole() {
            console.clear();
            updateStatus('Console cleared');
        }
        
        async function checkFiles() {
            updateStatus('Checking files...');
            const files = [
                'css/splash-screen.css',
                'js/splash-screen.js', 
                'assets/brightlens-splash-logo.svg'
            ];
            
            for (let file of files) {
                try {
                    const response = await fetch(file);
                    if (response.ok) {
                        console.log(`✅ ${file} - OK (${response.status})`);
                    } else {
                        console.log(`❌ ${file} - Error (${response.status})`);
                    }
                } catch (error) {
                    console.log(`❌ ${file} - Failed to fetch:`, error.message);
                }
            }
            updateStatus('File check completed - see console for details');
        }
        
        // Test on page load
        window.addEventListener('load', () => {
            updateStatus('Page loaded - checking splash screen availability...');
            
            setTimeout(() => {
                if (window.SplashScreen3D) {
                    updateStatus('✅ SplashScreen3D class is available');
                } else {
                    updateStatus('❌ SplashScreen3D class not found');
                }
            }, 1000);
        });
    </script>
    
    <!-- Load the splash screen script -->
    <script src="js/splash-screen.js"></script>
</body>
</html>
